services:
  app:
    image: ghcr.io/profies/examen-recu-ra345:latest
    container_name: examen-recu-ra345_inm
    ports:
      - "8080:8080"
    env_file:
      - .env
    depends_on:
      - postgresqldb
    restart: always

  postgresqldb:
    image: postgres:16
    container_name: postgresql_inm
    restart: always
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "2345:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
